# Foundation skeleton — deployment-deliverables hardens this (healthchecks tuned,
# entrypoint migrate+seed, multi-stage images). Keep services minimal here.

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sears}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sears}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Placeholder command — feature migrate+seed entrypoint lands in Phase 4.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - app

  # Phase 5 telephony dev exposure — `docker compose --profile phone up`.
  # ngrok tunnels the app so Twilio webhooks reach a local backend.
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["phone"]
    env_file:
      - .env
    command: ["http", "app:8000"]
    depends_on:
      - app

volumes:
  db_data:
