# Foundation skeleton — deployment-deliverables hardens this (healthchecks tuned,
# entrypoint migrate+seed, multi-stage images). Keep services minimal here.

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sears}
    ports:
      # Published on 5433 to dodge the near-universal host Postgres on 5432
      # (Homebrew/system installs shadow 127.0.0.1:5432 and break host-run tests).
      - "5433:5432"
    volumes:
      # Postgres 18 images store data under /var/lib/postgresql (no /data suffix);
      # mounting the old path makes the entrypoint refuse to start on fresh volumes.
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sears}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # In-cluster DB is authoritative for the local single-command launch,
      # regardless of what DATABASE_URL the developer's .env points at (e.g. Neon).
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sears
    ports:
      - "8000:8000"
    volumes:
      # Tier 3 image uploads (UPLOAD_DIR default data/uploads) — Docker named volume
      # is the storage decision (no object storage); survives container restarts.
      - uploads_data:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    # Placeholder command — feature migrate+seed entrypoint lands in Phase 4.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - app

  # Phase 5 telephony dev exposure — `docker compose --profile phone up`.
  # ngrok tunnels the app so Twilio webhooks reach a local backend.
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["phone"]
    env_file:
      - .env
    command: ["http", "app:8000"]
    depends_on:
      - app

volumes:
  db_data:
  uploads_data:
