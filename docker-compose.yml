# Local single-command launch (mission non-negotiable 3):
#   docker compose up --build   (== `make up`)
# fresh DB -> migrate -> seed -> serve, with db/app/web all healthcheck-gated.

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sears}
    ports:
      # Published on 5433 to dodge the near-universal host Postgres on 5432
      # (Homebrew/system installs shadow 127.0.0.1:5432 and break host-run tests).
      - "5433:5432"
    volumes:
      # postgres:18+ images store data under a version-specific subdirectory of
      # /var/lib/postgresql (pg_ctlcluster-style) — mount the parent, not
      # .../data, or the container refuses to start against a fresh volume.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sears}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # In-cluster DB is authoritative for the local single-command launch,
      # regardless of what DATABASE_URL the developer's .env points at (e.g. Neon).
      # DATABASE_URL_DIRECT must ALSO be overridden: alembic/env.py prefers it, so
      # without this the entrypoint's migrations target the developer's .env direct
      # URL (Neon, or localhost:5433 from .env.example → unreachable in-container),
      # not this db service. Both point at the in-cluster db for a self-contained run.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sears
      DATABASE_URL_DIRECT: postgresql://postgres:postgres@db:5432/sears
    ports:
      - "8000:8000"
    volumes:
      # Tier 3 image uploads (UPLOAD_DIR default data/uploads under WORKDIR /app) —
      # Docker named volume is the storage decision (no object storage).
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    # Image entrypoint (docker-entrypoint.sh) runs `alembic upgrade heads` then the
    # idempotent seed (when present) before exec-ing this uvicorn command.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* must be build args (inlined into the client bundle at `next
      # build`) — setting them only as container-runtime `environment:` below is
      # a no-op for already-built pages.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  # Phase 5 telephony dev exposure — `docker compose --profile phone up`.
  # ngrok tunnels the app so Twilio webhooks reach a local backend.
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["phone"]
    env_file:
      - .env
    command: ["http", "app:8000"]
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
