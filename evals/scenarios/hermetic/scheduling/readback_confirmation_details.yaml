id: scheduling_readback_confirmation_details
feature: scheduling
requires:
- scheduling
turns:
- caller: I'd like to book a repair for my refrigerator, it stopped cooling.
- caller: It's a Samsung RF28R7351SG, warm since yesterday, no error code.
- caller: My zip code is 60601.
- caller: Wednesday afternoon is best for me.
- caller: Yes, that's correct — please confirm the booking.
assert:
  facts:
    appliance_type: refrigerator
    brand: Samsung
    customer.zip: '60601'
    safety_flag: false
  no_reask: []
  safety_interrupt: false
  booking_row: true
  readback:
    technician: Marcus Bell
    date_tokens:
    - July 15
    time_tokens:
    - '1:00'
eval:
  metrics:
  - role_adherence
  - conversation_completeness
  rubrics:
  - booking_confirmation
