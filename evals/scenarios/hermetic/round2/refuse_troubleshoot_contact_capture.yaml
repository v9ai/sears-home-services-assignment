id: scheduling_refuse_troubleshoot_contact_capture
feature: scheduling
requires:
- scheduling
turns:
- caller: My refrigerator died and I don't want to troubleshoot anything — just send a technician.
- caller: It's a GE, and my zip is 60642.
- caller: Sam Rivera, sam.rivera@example.com.
- caller: Yes, that's correct.
- caller: The Tuesday morning one works.
- caller: Yes, book it.
assert:
  facts:
    appliance_type: refrigerator
    customer.zip: '60642'
    customer.name: Sam Rivera
    customer.email: sam.rivera@example.com
    safety_flag: false
  no_reask:
  - customer.zip
  - customer.email
  safety_interrupt: false
  booking_row: true
eval:
  metrics:
  - role_adherence
  - conversation_completeness
  rubrics:
  - booking_confirmation
