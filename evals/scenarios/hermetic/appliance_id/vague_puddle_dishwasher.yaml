id: core_vague_puddle_dishwasher
feature: core
requires: []
turns:
- caller: There's a puddle on my kitchen floor and I can't tell where it's from.
- caller: I think it's the dishwasher — a KitchenAid, built in under the counter.
- caller: Water seeps out the bottom of the door when it runs, started yesterday. No error code.
- caller: Thanks, I'll take a look at the door seal.
assert:
  facts:
    appliance_type: dishwasher
    brand: KitchenAid
    safety_flag: false
  no_reask: []
  safety_interrupt: false
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics:
  - english_only
