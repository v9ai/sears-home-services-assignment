    appliance_type: washer
    brand: LG
    safety_flag: false
  no_reask: []
  safety_interrupt: false
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics:
  - english_only
