id: core_vague_leak_washer
feature: core
requires: []
turns:
- caller: Hi — something's leaking, there's water all over my laundry room floor.
- caller: It's the washer, an LG front-loader.
- caller: Started this morning during a wash, no code, but I hear a gurgling sound.
- caller: Okay, I'll check those, thanks.
