id: visual_post_upload_incorporation
feature: visual
requires:
- visual
turns:
- caller: I just uploaded the photo of my dryer.
- caller: Yes, I see the lint buildup too, that's probably it.
- caller: Great, I'll clean that out first.
assert:
  facts:
    appliance_type: dryer
  no_reask: []
  safety_interrupt: false
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics:
  - photo_findings
