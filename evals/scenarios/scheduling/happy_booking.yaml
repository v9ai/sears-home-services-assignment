id: scheduling_happy_booking
feature: scheduling
requires:
- scheduling
turns:
- caller: Hi, my dishwasher stopped draining and I'd like someone to come fix it.
- caller: "It's a Bosch \u2014 leaving standing water every time, the last few cycles."
- caller: My zip code is 60614.
- caller: Tomorrow afternoon works, or the next day.
- caller: "Yes, that works \u2014 please book it."
assert:
  facts:
    appliance_type: dishwasher
    customer.zip: '60614'
  no_reask: []
  safety_interrupt: false
  booking_row: true
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics:
  - booking_confirmation
