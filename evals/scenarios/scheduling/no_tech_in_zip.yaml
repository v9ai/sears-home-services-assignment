id: scheduling_no_tech_in_zip
feature: scheduling
requires:
- scheduling
turns:
- caller: My HVAC is blowing warm air and I want a technician.
- caller: My zip code is 99999.
- caller: Is there anyone else nearby?
- caller: Okay, please let me know when someone's available.
assert:
  facts:
    appliance_type: hvac
    customer.zip: '99999'
  no_reask: []
  safety_interrupt: false
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics: []
