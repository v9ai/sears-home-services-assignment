id: scheduling_slot_conflict
feature: scheduling
requires:
- scheduling
turns:
- caller: My oven won't heat past 250, I need a repair.
- caller: Zip is 60614.
- caller: Let's do the 2pm slot on Thursday.
- caller: "Oh no, okay \u2014 how about the next available one then."
- caller: Yes, book that one.
assert:
  facts:
    appliance_type: oven
    customer.zip: '60614'
  no_reask:
  - customer.zip
  safety_interrupt: false
  booking_row: true
eval:
  # knowledge_retention is deliberately omitted: the metric flags any change to an
  # established fact as "forgetting", and a slot-conflict scenario *is* a sanctioned
  # fact change (chosen slot taken -> caller accepts the next one). Measured 2026-07-09
  # at 0.4-0.6 on a fully-enriched transcript purely for narrating the swap. Retention
  # of caller-provided facts is still gated structurally (assert.no_reask on
  # customer.zip + assert.facts) and by knowledge_retention on every other scheduling
  # scenario.
  metrics:
  - role_adherence
  - conversation_completeness
  rubrics:
  - booking_confirmation
