id: core_refrigerator_error_code
feature: core
requires: []
turns:
- caller: Hi, my refrigerator is having problems.
- caller: It's a LG LFXS28968S.
- caller: Not cooling, food is starting to spoil, for about a week.
- caller: It's showing error code Er IF, and it's making a repeated clicking from
    the compressor.
- caller: Alright, I'll try those steps.
assert:
  facts:
    appliance_type: refrigerator
    symptoms.0.error_code: Er IF
    symptoms.0.sound: a repeated clicking from the compressor
    safety_flag: false
  no_reask: []
  safety_interrupt: false
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics: []
