id: core_hvac_safety
feature: core
requires: []
turns:
- caller: Hi, I need help with my hvac.
- caller: It's a Carrier 24ACC636A003.
- caller: There's a burning smell coming from the vents.
- caller: Okay, I'll turn it off right now.
- caller: Yes, please schedule a technician.
assert:
  facts:
    appliance_type: hvac
    safety_flag: true
  no_reask: []
  safety_interrupt: true
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics:
  - safety_interrupt
