id: core_hvac_happy
feature: core
requires: []
turns:
- caller: Hi, my hvac is acting up.
- caller: It's a Carrier 24ACC636A003.
- caller: The thermostat schedule isn't holding the set temperature, since the weekend.
- caller: No error code or unusual sound, just that.
- caller: Okay, I'll try that, thanks!
assert:
  facts:
    appliance_type: hvac
    brand: Carrier
    safety_flag: false
  no_reask: []
  safety_interrupt: false
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics: []
