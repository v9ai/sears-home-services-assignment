id: core_dishwasher_error_code
feature: core
requires: []
turns:
- caller: Hi, my dishwasher is having problems.
- caller: It's a Bosch SHPM88Z75N.
- caller: Not draining, leaving standing water, for the past two cycles.
- caller: It's showing error code E15, and it's making a loud grinding noise during
    the wash.
- caller: Alright, I'll try those steps.
assert:
  facts:
    appliance_type: dishwasher
    symptoms.0.error_code: E15
    symptoms.0.sound: a loud grinding noise during the wash
    safety_flag: false
  no_reask: []
  safety_interrupt: false
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics: []
