id: core_washer_error_code
feature: core
requires: []
turns:
- caller: Hi, my washer is having problems.
- caller: It's a Samsung WF45T6000AW.
- caller: Won't drain, water pooling at the bottom of the tub, for the past three
    days.
- caller: It's showing error code 5E, and it's making a grinding noise during the
    spin cycle.
- caller: Alright, I'll try those steps.
assert:
  facts:
    appliance_type: washer
    symptoms.0.error_code: 5E
    symptoms.0.sound: a grinding noise during the spin cycle
    safety_flag: false
  no_reask: []
  safety_interrupt: false
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics: []
