id: core_dryer_safety
feature: core
requires: []
turns:
- caller: Hi, I need help with my dryer.
- caller: It's a Whirlpool WED4815EW.
- caller: There's smoke coming out of the dryer vent.
- caller: Okay, I'll turn it off right now.
- caller: Yes, please schedule a technician.
assert:
  facts:
    appliance_type: dryer
    safety_flag: true
  no_reask: []
  safety_interrupt: true
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics:
  - safety_interrupt
