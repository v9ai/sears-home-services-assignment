id: core_dryer_happy
feature: core
requires: []
turns:
- caller: Hi, my dryer is acting up.
- caller: It's a Whirlpool WED4815EW.
- caller: Runs a full cycle but clothes take two rounds to dry, for about a week.
- caller: No error code or unusual sound, just that.
- caller: Okay, I'll try that, thanks!
assert:
  facts:
    appliance_type: dryer
    brand: Whirlpool
    safety_flag: false
  no_reask: []
  safety_interrupt: false
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics: []
