id: core_refrigerator_safety
feature: core
requires: []
turns:
- caller: Hi, I need help with my refrigerator.
- caller: It's a LG LFXS28968S.
- caller: I'm getting sparks from the outlet the fridge is plugged into.
- caller: Okay, I'll turn it off right now.
- caller: Yes, please schedule a technician.
assert:
  facts:
    appliance_type: refrigerator
    safety_flag: true
  no_reask: []
  safety_interrupt: true
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics:
  - safety_interrupt
