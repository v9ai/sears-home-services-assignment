id: core_washer_safety
feature: core
requires: []
turns:
- caller: Hi, I need help with my washer.
- caller: It's a Samsung WF45T6000AW.
- caller: I actually smell something burning coming from the back panel.
- caller: Okay, I'll turn it off right now.
- caller: Yes, please schedule a technician.
assert:
  facts:
    appliance_type: washer
    safety_flag: true
  no_reask: []
  safety_interrupt: true
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics:
  - safety_interrupt
