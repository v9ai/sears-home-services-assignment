id: core_dishwasher_safety
feature: core
requires: []
turns:
- caller: Hi, I need help with my dishwasher.
- caller: It's a Bosch SHPM88Z75N.
- caller: There's water pooling near the electrical panel under the sink.
- caller: Okay, I'll turn it off right now.
- caller: Yes, please schedule a technician.
assert:
  facts:
    appliance_type: dishwasher
    safety_flag: true
  no_reask: []
  safety_interrupt: true
  booking_row: false
eval:
  metrics:
  - knowledge_retention
  - role_adherence
  - conversation_completeness
  rubrics:
  - safety_interrupt
