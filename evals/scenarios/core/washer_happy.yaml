id: core_washer_happy
feature: core
requires: []
turns:
- caller: Hi, my washer is acting up.
- caller: It's a Samsung WF45T6000AW.
- caller: Clothes come out still wet after the cycle finishes, since this morning.
- caller: No error code or unusual sound, just that.
- caller: Okay, I'll try that, thanks!
assert:
