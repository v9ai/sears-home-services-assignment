# Cloudflare Containers deploy — `web` (Next.js frontend).
# `make deploy` runs `wrangler deploy --config wrangler.web.toml` from `cloudflare/`.
#
# Builds the SAME web/Dockerfile Compose uses (tech-stack.md "Hosting (Cloudflare
# Containers)": no separate build path). NEXT_PUBLIC_API_URL / NEXT_PUBLIC_WS_URL
# are inlined into the client bundle at `next build` time (see web/Dockerfile ARGs).
# They are supplied as build-time `image_vars` below (Cloudflare passes each as a
# Docker build ARG of the same name); they must point at the deployed `app` Worker's
# URL, so deploy the `app` Worker first and set the values here before deploying web.

name = "sears-home-services-web"
main = "cloudflare/web-worker.ts"
compatibility_date = "2026-07-08"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "WebContainer"
image = "./web/Dockerfile"
max_instances = 1
instance_type = "basic"

# Build-time frontend vars baked into the Next.js client bundle by `next build`.
# Cloudflare passes each as a Docker build ARG of the same name to web/Dockerfile.
# Point these at the deployed `app` Worker's URL (https for API, wss for WebSocket)
# BEFORE deploying web; the localhost defaults below only keep dry-runs valid.
[containers.image_vars]
NEXT_PUBLIC_API_URL = "https://sears-home-services-app.eeeew.workers.dev"
NEXT_PUBLIC_WS_URL = "wss://sears-home-services-app.eeeew.workers.dev"

[[durable_objects.bindings]]
name = "WEB_CONTAINER"
class_name = "WebContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WebContainer"]
